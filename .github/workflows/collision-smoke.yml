name: Collision Smoke

# Verifies that ZeroAlloc.ORM.Generator composes with ZeroAlloc.Rest.Generator
# (and any other in-ecosystem source generator) in the same compilation unit
# under PublishAot=true. This is the gap EF Core's precompile-queries pipeline
# can't bridge — proving we don't fall into the same trap is the v1.0 release
# gate.
#
# Activated in milestone v0.7 (Phase B). The smoke project lives at
# tests/ZeroAlloc.ORM.GeneratorCollision.AotSmoke/. CI publishes it with
# PublishAot=true on linux-x64 and runs the native binary — any new
# IL2026/IL2046/IL3050 surfaced by the publish-time trimmer fails the job,
# and a non-zero exit from the runtime check fails the workflow.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  collision-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore tests/ZeroAlloc.ORM.GeneratorCollision.AotSmoke/ZeroAlloc.ORM.GeneratorCollision.AotSmoke.csproj

      - name: Publish AOT (linux-x64)
        # PublishAot=true is set inside the csproj itself. We deliberately do NOT
        # pass `-p:PublishAot=true` on the command line: that would promote it to
        # a global MSBuild property and propagate across the ProjectReference
        # graph, tripping NETSDK1207 on the build-time-only netstandard2.0
        # generator project.
        run: |
          dotnet publish tests/ZeroAlloc.ORM.GeneratorCollision.AotSmoke/ZeroAlloc.ORM.GeneratorCollision.AotSmoke.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -o ./collision-out

      - name: Run AOT-published collision smoke
        run: |
          chmod +x ./collision-out/ZeroAlloc.ORM.GeneratorCollision.AotSmoke
          ./collision-out/ZeroAlloc.ORM.GeneratorCollision.AotSmoke

      - name: Report binary size
        run: |
          ls -lh ./collision-out/ZeroAlloc.ORM.GeneratorCollision.AotSmoke
          file ./collision-out/ZeroAlloc.ORM.GeneratorCollision.AotSmoke
