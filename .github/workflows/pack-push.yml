name: Pack and Push

# Fires when release-please publishes a GitHub release for a tag (e.g. v0.1.0).
# Mirrors the proven AdoNet.Async + ZA.Mediator release workflow: build once, then pack
# each v0.1 package explicitly so the published set stays auditable.
#
# GitHub-limitation note: releases created by `googleapis/release-please-action`
# using the default GITHUB_TOKEN do NOT fire `release` events on other workflows
# (recursive-run protection). Use the `workflow_dispatch` manual trigger to publish
# such releases. Future option: swap release-please's token for a PAT to unblock
# the automatic path.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to pack + push (e.g. 0.1.0 — NO leading v)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Extract version from tag or workflow input
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release -p:Version=${{ steps.version.outputs.version }}

      # Test step intentionally omitted: the build-test workflow already validates
      # every push to main with the full test suite (75+ tests). Re-running them here
      # would (a) duplicate work and (b) trip a Verify.NET path-resolution edge case
      # on two snapshot tests when MSBuild's Version is set explicitly. Pack-push's
      # job is to pack + push, not re-validate.

      - name: Pack
        run: |
          dotnet pack src/ZeroAlloc.ORM.Abstractions/ZeroAlloc.ORM.Abstractions.csproj --no-build -c Release -p:PackageVersion=${{ steps.version.outputs.version }} -o ./artifacts
          dotnet pack src/ZeroAlloc.ORM/ZeroAlloc.ORM.csproj --no-build -c Release -p:PackageVersion=${{ steps.version.outputs.version }} -o ./artifacts
          dotnet pack src/ZeroAlloc.ORM.Generator/ZeroAlloc.ORM.Generator.csproj --no-build -c Release -p:PackageVersion=${{ steps.version.outputs.version }} -o ./artifacts
          dotnet pack src/ZeroAlloc.TypeConversions/ZeroAlloc.TypeConversions.csproj --no-build -c Release -p:PackageVersion=${{ steps.version.outputs.version }} -o ./artifacts

      - name: Push to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate
